apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-neo4j-connector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-neo4j-connector
  template:
    metadata:
      labels:
        app: kafka-neo4j-connector
    spec:
      containers:
        - name: connector
          image: change1472/cse511-kafka-neo4j-connector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            # Where Kafka is
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: "kafka-service:29092"
            # REST API port for Kafka Connect
            - name: CONNECT_REST_PORT
              value: "8083"

            # REQUIRED: connect worker group ID
            - name: CONNECT_GROUP_ID
              value: "kafka-connect"

            # Internal topics used by Kafka Connect
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "_connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "_connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "_connect-status"

            # Converters (keep it simple: JSON everywhere)
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.storage.StringConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_INTERNAL_KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_INTERNAL_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"

            # Where to look for plugins (includes Neo4j connector we installed)
            - name: CONNECT_PLUGIN_PATH
              value: "/usr/share/java,/usr/share/confluent-hub-components,/data/connect-jars"
